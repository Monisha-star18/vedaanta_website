<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- external css  -->
    <link rel="stylesheet" href="./styles/landing.css">

    <!-- bootsrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <!-- font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>
<body>

    <!-- contact navbar -->
    <div class="container-fluid contactNav-container d-none d-md-flex">
        <div class="container py-2">
            <div class="d-flex flex-wrap justify-content-center align-items-center">
                <!-- email -->
                <div class="d-flex justify-content-center align-items-center gap-2">
                    <i class="fa-solid fa-envelope" id="contact-icons"></i>
                    <p class="contact-info-text">info@vedaanta.com </p>
                </div>
                <p class="seprator px-2 text-light"> | </p>

                <!--Bangalore contanct  -->
                <div class="d-flex justify-content-center align-items-center gap-2">
                    <i class="fa-solid fa-phone" id="contact-icons"></i>
                    <p class="contact-info-title">Bangalore</p>
                    <p class="contact-info-text">+91 964 398 6236 </p>
                </div>
                <p class="seprator px-2 text-light"> | </p>

                <!--Coimbatore contanct  -->
                <div class="d-flex justify-content-center align-items-center gap-2">
                    <p class="contact-info-title">Coimbatore</p>
                    <p class="contact-info-text">+91 995 380 5885 </p>
                </div>
                <p class="seprator px-2 text-light"> | </p>

                <!--Hosur contanct  -->
                <div class="d-flex justify-content-center align-items-center gap-2">
                    <p class="contact-info-title">Hosur</p>
                    <p class="contact-info-text">+91 844 844 4714</p>
                </div>
                <p class="seprator px-2 text-light"> | </p>

                 <!--Kerala contanct  -->
                <div class="d-flex justify-content-center align-items-center gap-2">
                    <p class="contact-info-title">Kerala</p>
                    <p class="contact-info-text"> +91 844 779 8333</p>
                </div>
                <p class="seprator px-2 text-light"> | </p>

                <!-- instagra -->
                <img src="./asserts/images/svg/icon-instagram-logo.svg" alt="Follow Vedaanta Senior Living on Instagram" class="contact-si">
                <p class="seprator px-2 text-light"> | </p>

                 <!-- facebook -->
                <img src="./asserts/images/svg/icon-facebook-logo.svg" alt="Follow Vedaanta Senior Living on Facebook" class="contact-si">
                <p class="seprator px-2 text-light"> | </p>

                 <!-- youtube -->
                <img src="./asserts/images/svg/icon-youtube-logo.svg" alt="Follow Vedaanta Senior Living on YouTube" class="contact-si">
                <p class="seprator px-2 text-light"> | </p>

                 <!-- linkedin -->
                <img src="./asserts/images/svg/icon-linkedin-logo.svg" alt="Follow Vedaanta Senior Living on LinkedIn" class="contact-si">
                <p class="seprator px-2 text-light"> | </p>

            </div>
        </div>
    </div>
    
    <!-- main nav -->
    <div class="container main-nav">
        <div class="row">
            <!-- nav left -->
            <div class="col-6 col-md-2">
                <img src="./asserts/images/svg/vedaanta-new-logo.svg" alt="Vedaanta Senior Living Logo" class="py-3">
            </div>
            
            <!-- nav right -->
            <div class="col-6 col-md-10 d-flex justify-content-end">
                <!-- nav bar -->
                <nav class = " navbar navbar-expand-md  navbar-expand-lg">

                    <!-- hunbergur button -->
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <!-- menu -->
                    <div class="collapse navbar-collapse " id="navMenu">
                        <ul class="navItems mb-2 d-md-flex d-lg-flex flex-wrap justify-content-md-center gap-4">
                            <!-- home -->
                            <li class="nav-item pe-2"> HOME </li>

                            <!--ABOUT US  -->
                            <li class="nav-item pe-2"> ABOUT US </li>

                            <!--  LIFE AT VEDAANTA-->
                            <li class="nav-item pe-2">LIFE AT VEDAANTA</li>

                            <!-- LOCATIONS -->

                            <!-- VEDAANTA VANTAGE -->
                            <li class="nav-item pe-2"> VEDAANTA VANTAGE </li>

                            <!-- CAREER & PARTNERSHIPS -->
                            <li class="nav-item pe-2">CAREER & PARTNERSHIPS</li>

                            <!-- CONTACT US BUTTON -->
                            <li class="nav-item ">  
                                <button class="bg-success text-light border-0 rounded"> CONTACT US </button>    </li>
                        </ul>
                    </div>
 
 
 
 
 
                </nav> 
            </div>

        </div>
    </div>

    <!-- landing video -->
    <video class="landing-video mobile-video" width="100%" preload="auto" playsinline="" autoplay="" loop="" muted="">
            <source src="img/videos/vedaanta-landing-video-2-portrait.mp4" type="video/mp4">
            Your browser does not support the video tag.
    </video>
    

    <video class="landing-video desktop-video" width="100%" preload="auto" playsinline="" autoplay="" loop="" muted="">
            <source src="img/videos/vedaanta-landing-video-2-landscape.mp4" type="video/mp4">
            <source src="img/videos/vedaanta-landing-video-2-landscape.ogg" type="video/ogg">
            <source src="img/videos/vedaanta-landing-video-2-landscape.webm" type="video/webm">
            Your browser does not support the video tag.
        </video>


    <!-- bootsrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- external js  -->
    <script src="./scripts/landing.js"></script>
